<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 - PRO SLOT MASTER</title>
    <!-- 🎨 আলাদা স্টাইল শিট লিঙ্ক করা হলো ভাই -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">BETLOVER24</div>
            <div class="game">PRO SLOT MASTER</div>
        </div>
        <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
    </div>

    <!-- 🎮 ৩x৪ স্লট গ্রিড মেম্বার বোর্ড -->
    <div class="slot-machine" id="machine-board">
        <!-- ১২টি রিল ডায়নামিক জাভাস্ক্রিপ্ট দিয়ে পূর্ণ হবে ভাই -->
    </div>

    <!-- 🏆 মেগা উইন পপআপ ওভারলে -->
    <div id="win-overlay">🏆 WIN!! <br><span id="win-display">৳ 0</span></div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া -->
    <div class="footer-controls">
        <div class="quick-bets">
            <button class="q-btn active-bet" onclick="setQuickBet(10)">৳১০</button>
            <button class="q-btn" onclick="setQuickBet(50)">৳৫০</button>
            <button class="q-btn" onclick="setQuickBet(100)">৳১০০</button>
            <button class="q-btn" onclick="setQuickBet(500)">৳৫০০</button>
        </div>

        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center;">
                    <div style="font-size: 10px; color: #aaa;">BET</div>
                    <div style="font-size: 16px; font-weight: bold;" id="bet-display">৳১০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleSpin()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</button>
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 🎰 [উইনগো কালার ট্রেড ১৯২-১৯৪ নম্বর লাইনের হুবহু ওরিজিনাল ইউজার ট্র্যাকিং]
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        // 🎯 [অনলাইন ডাইনামিক রুট লক ভাই]: এটি নতুন হোস্টিং ও পোর্টের সাথে অটো-সিঙ্ক হয়ে কানেকশন এরর সাফ রাখবে ভাই!
        const SLOT_SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 10;
        let isSpinning = false;
        let isTurbo = false;
        let isAuto = false;
        let autoInterval = null;

        // 🎯 [নতুন কাস্টম স্লট প্রতীক মেমোরি লক ভাই]: আপনার পাঠানো স্ক্রিনশটের ১০টি ওরিজিনাল ছবির নাম সিঙ্ক
        const symbols = ['apple', 'banana', 'beer-bottle', 'begun', 'coin', 'dollar', 'jambura', 'rose', 'seven', 'water-bottle'];
        // 🎵 [লাকি ৭৭৭ স্লট অডিও মাস্টার ইঞ্জিন ভাই]: এটি আপনার ৪টি সাউন্ড ফাইলকে ১ মিলি-সেকেন্ডে সচল করবে!
        const slotSounds = {
            click: new Audio('click.mp3'),
            spin: new Audio('spin.mp3'),
            win: new Audio('win.mp3'),
            bigwin: new Audio('bigwin.mp3')
        };

        // অডিও ফাইল লোড প্রি-ক্যাশিং বুস্টার লক ভাই
        Object.values(slotSounds).forEach(sound => {
            sound.load();
        });

        // ৩x৪ গ্রিড এলিমেন্ট বোর্ড ইনিশিয়াল ডাইরেক্ট ছবি লোডার গেটওয়ে
        const board = document.getElementById("machine-board");
        for (let i = 0; i < 12; i++) {
            const reel = document.createElement("div");
            reel.className = "reel";
            reel.id = `reel-${i}`;
            reel.innerHTML = `<img src="./seven.png" alt="seven">`;
            board.appendChild(reel);
        }

        // 🎯 [উইনগো কালার ট্রেড সিঙ্ক - লাইভ সকেট লিসেনার গেটওয়ে ভাই]
        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) {
                        window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    }
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SLOT_SERVER_URL}/api/slot-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) {
                console.error("Balance fetch error:", e);
            }
        }

        window.onload = () => {
            if (window.parent) {
                window.parent.postMessage({ action: "refresh_wallet" }, "*");
            }
            fetchLiveBalance();
        };

        function setQuickBet(val) {
            if (isSpinning) return;
            currentBet = val;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            const btns = document.querySelectorAll(".q-btn");
            btns.forEach(b => b.classList.remove("active-bet"));
            event.target.classList.add("active-bet");
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 10) currentBet -= 10;
            if (action === 'plus' && currentBet < 20000) currentBet += 10;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
        }

        function toggleTurbo() {
            isTurbo = !isTurbo;
            document.getElementById("turbo-btn").classList.toggle("active", isTurbo);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) {
                handleSpin();
            }
        }

                // 🛫 [স্লট স্পিন কোর ইঞ্জিন ফাঞ্চন - হুবহু কালার ট্রেড ৩১১ লাইনের জিরো-এরর রেসপন্স সিঙ্ক ভাই]
        async function handleSpin() {
            if (isSpinning) return;
            
            // 🎵 [সাউন্ড বুস্টার ট্রিগার ভাই]: স্পিন বোতাম চাপার ১ মিলি-সেকেন্ডে সাউন্ড ফায়ার হবে!
            try {
                slotSounds.click.play();
                slotSounds.spin.play();
            } catch(e) { 
                console.log("Autoplay waiting for click"); 
            }
            
            document.getElementById("win-overlay").style.display = "none";
            const reels = document.querySelectorAll(".reel");
            reels.forEach(r => {
                r.classList.remove("win-highlight", "dim-effect");
                r.classList.add(isTurbo ? "turbo-mode" : "scrolling");
            });

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;

            try {
                const response = await fetch(`${SLOT_SERVER_URL}/api/slot-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                // 🎰 [উইনগো কালার ট্রেড ৩১১-৩১২ নম্বর লাইনের বিশুদ্ধ সাকসেস ট্র্যাকিং লক ভাই]
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    
                    if (window.parent) {
                        window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    }
                    if (window.top) {
                        window.top.postMessage({ action: "refresh_wallet" }, "*");
                    }

                    setTimeout(() => {
                        stopReels(data.matrix, data.winAmount, data.winLines);
                    }, isTurbo ? 400 : 1200);

                } else {
                    alert(data.message || "❌ Bet Declined!");
                    stopSpinState();
                }
            } catch (err) {
                console.error("Slot Core Network Error:", err);
                alert("⚠️ কানেকশন এরর! আবার চেষ্টা করুন।");
                stopSpinState();
            }
        }

        function stopReels(matrix, winAmount, winLines) {
            const reels = document.querySelectorAll(".reel");
            
            // সরাসরি ছবি ফোল্ডার থেকে ওরিজিনাল ইমেজ লোডার গেটওয়ে লক ভাই
            for (let i = 0; i < 12; i++) {
                reels[i].classList.remove("scrolling", "turbo-mode");
                const symbolImg = matrix[i];
                reels[i].innerHTML = `<img src="./${symbolImg}.png" alt="${symbolImg}">`;
            }

            if (winAmount > 0) {
                document.getElementById("win-display").innerText = `৳${winAmount}`;
                document.getElementById("win-overlay").style.display = "block";
                
                reels.forEach(r => r.classList.add("dim-effect"));
                winLines.forEach(index => {
                    if(reels[index]) {
                        reels[index].classList.remove("dim-effect");
                        reels[index].classList.add("win-highlight");
                    }
                });
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopSpinState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleSpin();
                }, 1500);
            }
        }

        function stopSpinState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) {
                clearTimeout(autoInterval);
            }
        }
    </script>
</body>
</html>
